name: 'ContinuityOS Merge Guard'
description: >
  Smallest-release legitimacy check for a pull request: builds a canonical
  object-identity payload {repo, pr_number, head_sha, base_sha, actor}
  plus optional agent-authored workflow policy, hashes it, and emits VALID
  or NULL (fail-closed) plus a proof artifact.
  Designed to be added as a required status check.

inputs:
  repo:
    description: 'owner/repo'
    required: true
  pr-number:
    description: 'Pull request number'
    required: true
  head-sha:
    description: 'PR head commit SHA'
    required: true
  base-sha:
    description: 'PR base commit SHA'
    required: true
  actor:
    description: 'PR author / actor login'
    required: true
  author-kind:
    description: "Explicit PR author classification: 'agent', 'human', or 'unknown'"
    required: false
    default: 'unknown'
  require-agent-authored:
    description: "Set to 'true' for an agent-authored PR workflow; non-agent PRs fail closed to NULL"
    required: false
    default: 'false'
  pr-author:
    description: 'PR author login (defaults to actor when omitted)'
    required: false
    default: ''
  head-ref:
    description: 'PR head branch name (heuristic agent-session signal, e.g. claude/*)'
    required: false
    default: ''
  pr-body:
    description: 'PR description; may carry an attribution metadata block (authoritative signal)'
    required: false
    default: ''
  pr-labels:
    description: "Comma/newline-separated PR labels (e.g. 'agent-authored'); authoritative signal"
    required: false
    default: ''
  commit-trailers:
    description: "Newline-separated commit trailers (e.g. 'Agent-Authored-By: ...'); authoritative signal"
    required: false
    default: ''
  operator-id:
    description: 'Optional human operator id behind an agent-authored PR'
    required: false
    default: ''
  require-diff-binding:
    description: "Set to 'true' to require caller-supplied changed-files hash/count binding"
    required: false
    default: 'false'
  changed-files-hash:
    description: "sha256:<hex> hash of the canonical changed-files/diff evidence supplied by the caller"
    required: false
    default: ''
  changed-files-count:
    description: 'Non-negative count of changed files represented by changed-files-hash'
    required: false
    default: ''
  require-review-binding:
    description: "Set to 'true' to require caller-supplied approving review evidence bound to head-sha"
    required: false
    default: 'false'
  review-state:
    description: "Caller-supplied review state; must be 'APPROVED' when review binding is required or supplied"
    required: false
    default: ''
  review-commit-sha:
    description: 'Caller-supplied review commit SHA; must equal head-sha when review binding is required or supplied'
    required: false
    default: ''
  review-author:
    description: 'Optional caller-supplied approving review actor/login recorded in the proof'
    required: false
    default: ''
  require-merge-commit-binding:
    description: "Set to 'true' to require caller-supplied post-merge commit evidence"
    required: false
    default: 'false'
  merge-commit-sha:
    description: 'Caller-supplied post-merge commit SHA recorded in the proof'
    required: false
    default: ''
  merged-at:
    description: 'Caller-supplied merge timestamp recorded in the proof'
    required: false
    default: ''

outputs:
  result:
    description: 'VALID or NULL'
    value: ${{ steps.merge-guard.outputs.result }}
  proof_id:
    description: 'Proof identifier bound to pr_number and head_sha'
    value: ${{ steps.merge-guard.outputs.proof_id }}
  proof_hash:
    description: 'sha256 of the canonical payload'
    value: ${{ steps.merge-guard.outputs.proof_hash }}
  proof_url:
    description: 'Path to the uploaded MERGE_GUARD_PROOF.json artifact'
    value: ${{ steps.merge-guard.outputs.proof_url }}
  author_kind:
    description: "Normalized author classification: 'agent', 'human', or 'unknown'"
    value: ${{ steps.merge-guard.outputs.author_kind }}
  null_reasons:
    description: 'Comma-separated NULL reason codes, empty when result is VALID'
    value: ${{ steps.merge-guard.outputs.null_reasons }}
  attribution_status:
    description: "Agent Identity gate: 'identity_present', 'identity_missing', or 'identity_ambiguous'"
    value: ${{ steps.merge-guard.outputs.attribution_status }}
  attribution_classification:
    description: "Attribution class: AGENT_AUTHORED, AGENT_ASSISTED, HUMAN_AUTHORED, or UNKNOWN"
    value: ${{ steps.merge-guard.outputs.attribution_classification }}
  actor_kind:
    description: "Normalized actor kind: 'human', 'agent', 'bot', or 'unknown'"
    value: ${{ steps.merge-guard.outputs.actor_kind }}
  attribution_evidence_hash:
    description: 'sha256 of the canonicalized attribution evidence array'
    value: ${{ steps.merge-guard.outputs.attribution_evidence_hash }}
  require_diff_binding:
    description: "Normalized diff binding requirement: 'true' or 'false'"
    value: ${{ steps.merge-guard.outputs.require_diff_binding }}
  changed_files_hash:
    description: 'Caller-supplied changed-files evidence hash recorded in the proof'
    value: ${{ steps.merge-guard.outputs.changed_files_hash }}
  changed_files_count:
    description: 'Caller-supplied changed-files count recorded in the proof'
    value: ${{ steps.merge-guard.outputs.changed_files_count }}
  require_review_binding:
    description: "Normalized review binding requirement: 'true' or 'false'"
    value: ${{ steps.merge-guard.outputs.require_review_binding }}
  review_state:
    description: 'Caller-supplied review state recorded in the proof'
    value: ${{ steps.merge-guard.outputs.review_state }}
  review_commit_sha:
    description: 'Caller-supplied review commit SHA recorded in the proof'
    value: ${{ steps.merge-guard.outputs.review_commit_sha }}
  review_author:
    description: 'Optional caller-supplied approving review actor/login recorded in the proof'
    value: ${{ steps.merge-guard.outputs.review_author }}
  require_merge_commit_binding:
    description: "Normalized merge commit binding requirement: 'true' or 'false'"
    value: ${{ steps.merge-guard.outputs.require_merge_commit_binding }}
  merge_commit_sha:
    description: 'Caller-supplied post-merge commit SHA recorded in the proof'
    value: ${{ steps.merge-guard.outputs.merge_commit_sha }}
  merged_at:
    description: 'Caller-supplied merge timestamp recorded in the proof'
    value: ${{ steps.merge-guard.outputs.merged_at }}

runs:
  using: 'composite'
  steps:
    - name: Run legitimacy check
      id: merge-guard
      shell: bash
      env:
        MERGE_GUARD_REPO: ${{ inputs.repo }}
        MERGE_GUARD_PR_NUMBER: ${{ inputs.pr-number }}
        MERGE_GUARD_HEAD_SHA: ${{ inputs.head-sha }}
        MERGE_GUARD_BASE_SHA: ${{ inputs.base-sha }}
        MERGE_GUARD_ACTOR: ${{ inputs.actor }}
        MERGE_GUARD_AUTHOR_KIND: ${{ inputs.author-kind }}
        MERGE_GUARD_REQUIRE_AGENT_AUTHORED: ${{ inputs.require-agent-authored }}
        MERGE_GUARD_PR_AUTHOR: ${{ inputs.pr-author }}
        MERGE_GUARD_HEAD_REF: ${{ inputs.head-ref }}
        MERGE_GUARD_PR_BODY: ${{ inputs.pr-body }}
        MERGE_GUARD_PR_LABELS: ${{ inputs.pr-labels }}
        MERGE_GUARD_COMMIT_TRAILERS: ${{ inputs.commit-trailers }}
        MERGE_GUARD_OPERATOR_ID: ${{ inputs.operator-id }}
        MERGE_GUARD_REQUIRE_DIFF_BINDING: ${{ inputs.require-diff-binding }}
        MERGE_GUARD_CHANGED_FILES_HASH: ${{ inputs.changed-files-hash }}
        MERGE_GUARD_CHANGED_FILES_COUNT: ${{ inputs.changed-files-count }}
        MERGE_GUARD_REQUIRE_REVIEW_BINDING: ${{ inputs.require-review-binding }}
        MERGE_GUARD_REVIEW_STATE: ${{ inputs.review-state }}
        MERGE_GUARD_REVIEW_COMMIT_SHA: ${{ inputs.review-commit-sha }}
        MERGE_GUARD_REVIEW_AUTHOR: ${{ inputs.review-author }}
        MERGE_GUARD_REQUIRE_MERGE_COMMIT_BINDING: ${{ inputs.require-merge-commit-binding }}
        MERGE_GUARD_MERGE_COMMIT_SHA: ${{ inputs.merge-commit-sha }}
        MERGE_GUARD_MERGED_AT: ${{ inputs.merged-at }}
      run: node "${{ github.action_path }}/check.mjs"

    - name: Upload merge guard proof
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: MERGE_GUARD_PROOF
        path: MERGE_GUARD_PROOF.json
        if-no-files-found: ignore

branding:
  icon: shield
  color: blue
