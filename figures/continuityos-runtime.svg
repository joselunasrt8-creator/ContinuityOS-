<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">ContinuityOS runtime overview</title>
  <desc id="desc">A simple runtime flow from intent through validation, authority, execution, and proof.</desc>
  <rect width="1200" height="420" fill="#f8fafc"/>
  <text x="600" y="70" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="36" font-weight="700" fill="#0f172a">ContinuityOS Runtime</text>
  <text x="600" y="108" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Validation precedes state-changing execution</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" text-anchor="middle">
    <rect x="80" y="180" width="160" height="80" rx="14" fill="#ffffff" stroke="#334155" stroke-width="2"/>
    <text x="160" y="228" fill="#0f172a">Intent</text>
    <rect x="300" y="180" width="160" height="80" rx="14" fill="#ffffff" stroke="#334155" stroke-width="2"/>
    <text x="380" y="228" fill="#0f172a">Validation</text>
    <rect x="520" y="180" width="160" height="80" rx="14" fill="#ffffff" stroke="#334155" stroke-width="2"/>
    <text x="600" y="228" fill="#0f172a">Authority</text>
    <rect x="740" y="180" width="160" height="80" rx="14" fill="#ffffff" stroke="#334155" stroke-width="2"/>
    <text x="820" y="228" fill="#0f172a">Execution</text>
    <rect x="960" y="180" width="160" height="80" rx="14" fill="#ffffff" stroke="#334155" stroke-width="2"/>
    <text x="1040" y="228" fill="#0f172a">Proof</text>
  </g>
  <g stroke="#0f172a" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M240 220 H295"/>
    <path d="M460 220 H515"/>
    <path d="M680 220 H735"/>
    <path d="M900 220 H955"/>
  </g>
  <text x="600" y="330" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">If no valid object exists → nothing happens</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
  </defs>
</svg>
