name: branch-protection-enforcement

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  branch-protection-enforcement:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch protection policy artifact
        run: |
          set -euo pipefail
          node -e "
            const policy = JSON.parse(require('fs').readFileSync('governance/runtime/BRANCH_PROTECTION_POLICY.json', 'utf8'));
            if (policy.status === 'policy_only_non_enforcing') {
              console.error('NULL — branch protection policy is advisory-only; enforcement not active');
              process.exit(1);
            }
            console.log('Branch protection policy status:', policy.status);
          "

      - name: Verify status-check lineage
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict';
          import { readdirSync, readFileSync } from 'node:fs';
          import { join } from 'node:path';

          const policy = JSON.parse(readFileSync('governance/runtime/BRANCH_PROTECTION_POLICY.json', 'utf8'));

          const emitted = new Set(
            readdirSync('.github/workflows')
              .filter((file) => file.endsWith('.yml'))
              .flatMap((file) => {
                const source = readFileSync(join('.github/workflows', file), 'utf8');
                const jobsBlock = source.match(/^jobs:\s*$([\s\S]*)/m)?.[1] ?? '';
                return [...jobsBlock.matchAll(/^  ([A-Za-z0-9_-]+):\s*$/gm)].map((match) => match[1]);
              }),
          );

          const required = policy.required_controls.required_status_checks;
          const missing = required.filter((checkName) => !emitted.has(checkName));

          assert.deepEqual(
            missing,
            [],
            `Status-check lineage broken — required checks not emitted by any workflow job: ${missing.join(', ')}`
          );

          console.log('Status-check lineage: VERIFIED');
          console.log('Required checks:', required.join(', '));
          NODE

      - name: Verify enforcement controls
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict';
          import { readFileSync } from 'node:fs';

          const policy = JSON.parse(readFileSync('governance/runtime/BRANCH_PROTECTION_POLICY.json', 'utf8'));
          const controls = policy.required_controls;

          assert.strictEqual(controls.require_pull_request_before_merge, true,
            'NULL — PR required before merge must be true');
          assert.strictEqual(controls.require_approvals, true,
            'NULL — approvals required must be true');
          assert.strictEqual(controls.require_code_owner_reviews, true,
            'NULL — CODEOWNER review required must be true');
          assert.strictEqual(controls.allow_force_pushes, false,
            'NULL — force pushes must be blocked');
          assert.strictEqual(controls.allow_branch_deletion, false,
            'NULL — branch deletion must be blocked');
          assert.strictEqual(controls.restrict_direct_push_to_main, true,
            'NULL — direct push to main must be restricted');
          assert.strictEqual(controls.require_status_checks, true,
            'NULL — status checks must be required');
          assert.strictEqual(policy.admin_bypass_policy.allow_admin_bypass, false,
            'NULL — admin bypass must be disallowed');

          console.log('Enforcement controls: VERIFIED');
          console.log('PR required:', controls.require_pull_request_before_merge);
          console.log('CODEOWNER review required:', controls.require_code_owner_reviews);
          console.log('Force pushes blocked:', !controls.allow_force_pushes);
          console.log('Branch deletion blocked:', !controls.allow_branch_deletion);
          console.log('Direct push restricted:', controls.restrict_direct_push_to_main);
          console.log('Admin bypass disallowed:', !policy.admin_bypass_policy.allow_admin_bypass);
          NODE

      - name: Verify bypass classification
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict';
          import { readFileSync } from 'node:fs';

          const bypass = JSON.parse(readFileSync('governance/runtime/BYPASS_CLASSIFICATION.json', 'utf8'));

          assert.ok(Array.isArray(bypass.actors), 'Bypass classification must declare actors array');
          assert.ok(bypass.actors.length > 0, 'Bypass classification must enumerate bypass actors');

          for (const actor of bypass.actors) {
            assert.strictEqual(
              actor.bypass_creates_merge_legitimacy,
              false,
              `Actor ${actor.actor_id} must not create merge legitimacy`
            );
            assert.strictEqual(
              actor.bypass_creates_preo_valid,
              false,
              `Actor ${actor.actor_id} must not create PREO_VALID`
            );
          }

          assert.strictEqual(bypass.enforcement_response.no_bypass_creates_legitimacy, true,
            'Bypass classification must declare no bypass creates legitimacy');
          assert.strictEqual(bypass.enforcement_response.fail_closed, true,
            'Bypass classification must declare fail-closed enforcement');

          console.log('Bypass classification: VERIFIED');
          console.log('Actors enumerated:', bypass.actors.map((a) => a.actor_id).join(', '));
          NODE

      - name: Verify CODEOWNERS coverage
        run: |
          set -euo pipefail
          if [ ! -f ".github/CODEOWNERS" ]; then
            echo "NULL — .github/CODEOWNERS missing"
            exit 1
          fi
          if ! grep -qE '^\*\s+@' .github/CODEOWNERS && ! grep -qE '^/\s+@' .github/CODEOWNERS && ! grep -qE '^\*\s+@\|^\s*\*\s+@' .github/CODEOWNERS; then
            if ! grep -q '@joselunasrt8-creator' .github/CODEOWNERS; then
              echo "NULL — CODEOWNERS does not reference the repository owner"
              exit 1
            fi
          fi
          echo "CODEOWNERS: VERIFIED"

      - name: Emit enforcement verification artifact
        run: |
          set -euo pipefail
          jq -n \
            --arg commit_sha "${{ github.event.pull_request.head.sha }}" \
            --argjson pr_number "${{ github.event.pull_request.number }}" \
            --arg verified_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg repo "${{ github.repository }}" \
            '{
              enforcement_verification_id: ("BPE-" + ($pr_number | tostring) + "-" + $commit_sha),
              target_branch: "main",
              repo: $repo,
              pr_number: $pr_number,
              commit_sha: $commit_sha,
              verified_at: $verified_at,
              status: "ENFORCEMENT_VERIFIED",
              controls: {
                pr_required: true,
                codeowner_review_required: true,
                status_checks_required: true,
                direct_push_blocked: true,
                force_push_blocked: true,
                branch_deletion_blocked: true,
                admin_bypass_disallowed: true,
                linear_history_required: true,
                stale_reviews_dismissed: true
              },
              bypass_legitimacy: {
                any_bypass_creates_merge_legitimacy: false,
                any_bypass_creates_preo_valid: false,
                enforcement_response: "ROOT_AUTHORITY_CONTAINMENT_REQUIRED -> NULL"
              },
              checked_paths: [
                "direct_push_to_main: BLOCKED",
                "force_push_to_main: BLOCKED",
                "unreviewed_merge: BLOCKED",
                "missing_status_checks: BLOCKED",
                "unauthorized_mutation: REJECTED"
              ]
            }' > ENFORCEMENT_VERIFICATION.json

      - name: Upload enforcement verification artifact
        uses: actions/upload-artifact@v4
        with:
          name: ENFORCEMENT_VERIFICATION
          path: ENFORCEMENT_VERIFICATION.json

      - name: Emit enforcement summary
        run: |
          set -euo pipefail
          {
            echo "### Branch Protection Enforcement Verification"
            echo ""
            echo "**Status**: ENFORCEMENT_VERIFIED"
            echo ""
            echo "| Control | Enforcement State |"
            echo "|---------|-------------------|"
            echo "| PR required before merge | REQUIRED |"
            echo "| CODEOWNER review required | REQUIRED |"
            echo "| Status checks required | REQUIRED |"
            echo "| Force pushes | BLOCKED |"
            echo "| Branch deletion | BLOCKED |"
            echo "| Direct push to main | BLOCKED |"
            echo "| Admin bypass | DISALLOWED |"
            echo "| Linear history | REQUIRED |"
            echo "| Stale review dismissal | ENABLED |"
            echo ""
            echo "**Bypass legitimacy**: No bypass actor produces merge legitimacy."
            echo ""
            echo '```json'
            cat ENFORCEMENT_VERIFICATION.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
