name: constitutional-integrity

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  constitutional-integrity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect constitutional drift
        id: constitutional_drift
        shell: bash
        run: |
          set -euo pipefail

          CONSTITUTIONAL_PATHS=(
            "governance/"
            "src/runtime/validate.ts"
            "src/runtime/execute.ts"
            "src/runtime/canonicalize.ts"
            "src/runtime/authority.ts"
            "src/runtime/continuity.ts"
          )

          git diff --name-only origin/main...HEAD > changed_files.txt

          echo "Changed files:"
          cat changed_files.txt

          CONSTITUTIONAL_DRIFT=false

          while read -r file; do
            for path in "${CONSTITUTIONAL_PATHS[@]}"; do
              if [[ "$file" == "$path"* ]] || [[ "$file" == "$path" ]]; then
                CONSTITUTIONAL_DRIFT=true
              fi
            done
          done < changed_files.txt

          echo "constitutional_drift=$CONSTITUTIONAL_DRIFT" >> "$GITHUB_OUTPUT"

          if [[ "$CONSTITUTIONAL_DRIFT" == "true" ]]; then
            echo "Constitutional drift detected."
          else
            echo "No constitutional drift detected."
          fi

      - name: Validate governance JSON
        if: steps.constitutional_drift.outputs.constitutional_drift == 'true'
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y jq

          for f in governance/*.json; do
            jq . "$f" >/dev/null
          done

      - name: Ensure PREO and SCO evidence exists
        if: steps.constitutional_drift.outputs.constitutional_drift == 'true'
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_FILES=(
            "governance/governance_mutation_control.json"
            "governance/execution_surfaces.json"
          )

          for f in "${REQUIRED_FILES[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "Missing governance evidence file: $f"
              exit 1
            fi
          done

      - name: Verify canonical runtime routes unchanged
        if: steps.constitutional_drift.outputs.constitutional_drift == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if git diff origin/main...HEAD -- | grep -E "CANONICAL_RUNTIME_ROUTES"; then
            echo "Canonical runtime routes modified."
            exit 1
          fi

      - name: Detect executable route expansion
        if: steps.constitutional_drift.outputs.constitutional_drift == 'true'
        shell: bash
        run: |
          set -euo pipefail

          FORBIDDEN_PATTERNS=(
            "app.post("
            "router.post("
            "app.put("
            "router.put("
            "app.delete("
            "router.delete("
          )

          git diff origin/main...HEAD > constitutional.patch

          for pattern in "${FORBIDDEN_PATTERNS[@]}"; do
            if grep -F "$pattern" constitutional.patch; then
              echo "Executable route expansion detected: $pattern"
              exit 1
            fi
          done

      - name: Constitutional integrity pass
        if: steps.constitutional_drift.outputs.constitutional_drift == 'true'
        run: |
          echo "Constitutional integrity preserved."
