name: merge-governance-check
# owner: #1604
# policy: MERGE_GOVERNANCE_RULES
# policy-path: governance/runtime/MERGE_GOVERNANCE_RULES.json
# issue-lineage: #1666 → #1604

on:
  pull_request:
    branches:
      - main
  merge_group:

permissions:
  contents: read
  pull-requests: read
  checks: read
  actions: read

jobs:
  merge-governance-check:
    runs-on: ubuntu-latest

    steps:
      - name: Reject merge queue attempts
        if: github.event_name == 'merge_group'
        run: |
          echo "NULL — merge_group event detected."
          echo "Merge queue is DISABLED_FOR_GOVERNED_BRANCHES per CI-003 and MERGE_GOVERNANCE_RULES.json merge_queue_policy."
          echo "Merge queue may produce a combined SHA not covered by the original PREO/SCO candidate."
          echo "Result: MERGE_LEGITIMACY_NULL"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify merge actor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          ACTOR="${{ github.actor }}"

          if [[ "$ACTOR" == *"[bot]"* ]]; then
            ACTOR_TYPE="bot"
            PERMITTED=$(jq --arg actor "$ACTOR" \
              '[.permitted_bot_actors[] | select(. == $actor)] | length' \
              governance/merge-legitimacy/MERGE_ACTOR_REGISTRY.json)
            if [ "$PERMITTED" -ne 0 ]; then
              ACTOR_CLASSIFICATION="BOT_MERGE_ACTOR"
            else
              # Issue #2011 — bot-actor GMA issuance carve-out.
              # The GMA issuer (governance-mutation-authorization.yml) commits the GMA
              # artifact as github-actions[bot] and pushes it, so the resulting PR
              # synchronize event is bot-attributed even though an OWNER authorized it via
              # workflow_dispatch. Previously this NULLed and a re-run could not clear it,
              # forcing a manual human-attributed push (Issue #2011, observed on #1999).
              # Admit a bot actor ONLY when BOTH hold, so arbitrary bot commits still NULL:
              #   (1) the PR head commit changes only the GMA artifact files
              #       (no arbitrary code rides in under the bot identity), AND
              #   (2) an owner-dispatched (non-bot triggering_actor) run of
              #       governance-mutation-authorization.yml exists on this head branch.
              # Re-evaluated every run, so a re-run clears once a valid owner dispatch exists.
              # Defense in depth: the downstream GMA validation still binds (branch +
              # governed_files_hash) to a GMA_VALID entry, so an artifact-only bot commit
              # whose diff is not actually authorized is still NULLed there.
              GMA_SINGLETON="governance/authorizations/GOVERNANCE_MUTATION_AUTHORIZATION.json"
              GMA_REGISTRY="governance/authorizations/gma_registry.jsonl"

              ARTIFACT_ONLY="true"
              CHANGED="$(git diff --name-only "${HEAD_SHA}^" "${HEAD_SHA}" 2>/dev/null || true)"
              if [ -z "$CHANGED" ]; then
                ARTIFACT_ONLY="false"
              else
                while IFS= read -r f; do
                  [ -z "$f" ] && continue
                  if [ "$f" != "$GMA_SINGLETON" ] && [ "$f" != "$GMA_REGISTRY" ]; then
                    ARTIFACT_ONLY="false"
                    break
                  fi
                done <<< "$CHANGED"
              fi

              OWNER_DISPATCH="false"
              if [ "$ARTIFACT_ONLY" = "true" ]; then
                OWNER_RUNS=$(gh api --paginate \
                  "repos/${REPO}/actions/workflows/governance-mutation-authorization.yml/runs?branch=${HEAD_REF}&event=workflow_dispatch&per_page=100" \
                  --jq '[.workflow_runs[] | select(((.triggering_actor.login // "") | endswith("[bot]")) | not)] | length' 2>/dev/null || echo "0")
                if [ "${OWNER_RUNS:-0}" -gt 0 ]; then
                  OWNER_DISPATCH="true"
                fi
              fi

              if [ "$ARTIFACT_ONLY" = "true" ] && [ "$OWNER_DISPATCH" = "true" ]; then
                ACTOR_CLASSIFICATION="BOT_GMA_ISSUANCE"
                echo "Bot actor $ACTOR admitted as GMA issuance: head commit is a GMA artifact commit linked to an owner-dispatched governance-mutation-authorization run (Issue #2011)."
              else
                echo "NULL — actor $ACTOR is an unrecognized bot not in permitted_bot_actors allowlist."
                echo "GMA-issuance carve-out not satisfied: artifact_only=$ARTIFACT_ONLY owner_dispatched_gma_run=$OWNER_DISPATCH"
                echo "A bot actor is admitted only for a GMA artifact-only commit linked to an owner-dispatched governance-mutation-authorization run (Issue #2011)."
                echo "Result: MERGE_LEGITIMACY_NULL"
                exit 1
              fi
            fi
          else
            ACTOR_TYPE="human"
            ACTOR_CLASSIFICATION="HUMAN_MERGE_ACTOR"
          fi

          echo "ACTOR_CLASSIFICATION=$ACTOR_CLASSIFICATION" >> "$GITHUB_ENV"
          echo "actor_type=$ACTOR_TYPE actor=$ACTOR classification=$ACTOR_CLASSIFICATION"

      - name: Detect changed files and governed paths
        if: github.event_name != 'merge_group'
        run: |
          set -euo pipefail

          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > changed_files.txt

          : > governed_files.txt
          : > mutation_classes.txt
          : > target_surfaces.txt

          GOVERNED_PATH_DETECTED="false"

          while IFS= read -r file; do
            case "$file" in
              governance/authorizations/standing_authority_registry.jsonl)
                # GAP-005 Phase 2: the Standing Authority registry grants reusable
                # capability (not mere evidence), so issuing/revoking an authority is a
                # governance_mutation requiring a GMA — the owner-dispatch provenance for
                # the authority layer. (Must precede the governance/authorizations/* exemption.)
                echo "$file" >> governed_files.txt
                echo "governance_mutation" >> mutation_classes.txt
                echo "standing_authority_registry" >> target_surfaces.txt
                GOVERNED_PATH_DETECTED="true"
                ;;
              governance/authorizations/*)
                # GMA artifacts: authorization evidence, not governance primitives (GAP-005)
                ;;
              runtime/standing-authority.mjs)
                # GAP-005 Phase 2: the Standing Authority derivation verifier is the
                # admission oracle loaded at merge-check time; editing it must require a
                # GMA so it cannot be silently widened/disabled outside governance.
                echo "$file" >> governed_files.txt
                echo "governance_mutation" >> mutation_classes.txt
                echo "standing_authority_verifier" >> target_surfaces.txt
                GOVERNED_PATH_DETECTED="true"
                ;;
              governance/merge-legitimacy/merge_proof_registry.jsonl)
                # Append-only proof evidence surface: records merge proof events after merge.
                # Does not define governance rules, policies, authority, or validation logic.
                # Classified as proof_persistence, not governance_mutation. GMA not required.
                echo "$file" >> governed_files.txt
                echo "proof_persistence" >> mutation_classes.txt
                echo "proof_evidence_surface" >> target_surfaces.txt
                GOVERNED_PATH_DETECTED="true"
                ;;
              governance/operational-risk/*.md)
                # Evidence-only operational-risk audit artifacts map external blockers and
                # required proof without mutating governance rules, authority, workflows,
                # runtime execution, or proof persistence. Keep them SCO-visible but do not
                # require GMA because no governance primitive changes.
                echo "$file" >> governed_files.txt
                echo "operational_risk_evidence" >> mutation_classes.txt
                echo "operational_risk_evidence_surface" >> target_surfaces.txt
                GOVERNED_PATH_DETECTED="true"
                ;;
              governance/*)
                echo "$file" >> governed_files.txt
                echo "governance_mutation" >> mutation_classes.txt
                echo "governance_runtime" >> target_surfaces.txt
                GOVERNED_PATH_DETECTED="true"
                ;;
              .github/workflows/*)
                echo "$file" >> governed_files.txt
                echo "workflow_mutation" >> mutation_classes.txt
                echo "source_control_governance" >> target_surfaces.txt
                GOVERNED_PATH_DETECTED="true"
                ;;
              src/*)
                echo "$file" >> governed_files.txt
                echo "runtime_mutation" >> mutation_classes.txt
                echo "runtime_boundary" >> target_surfaces.txt
                GOVERNED_PATH_DETECTED="true"
                ;;
              schema.sql)
                echo "$file" >> governed_files.txt
                echo "schema_mutation" >> mutation_classes.txt
                echo "database_schema" >> target_surfaces.txt
                GOVERNED_PATH_DETECTED="true"
                ;;
              migrations/*)
                echo "$file" >> governed_files.txt
                echo "migration_mutation" >> mutation_classes.txt
                echo "database_migration" >> target_surfaces.txt
                GOVERNED_PATH_DETECTED="true"
                ;;
              wrangler.toml)
                echo "$file" >> governed_files.txt
                echo "deployment_config_mutation" >> mutation_classes.txt
                echo "deployment_configuration" >> target_surfaces.txt
                GOVERNED_PATH_DETECTED="true"
                ;;
            esac
          done < changed_files.txt

          RISK_CLASS="$(bash scripts/classify-risk.sh changed_files.txt)"

          sort -u governed_files.txt -o governed_files.txt
          sort -u mutation_classes.txt -o mutation_classes.txt
          sort -u target_surfaces.txt -o target_surfaces.txt

          echo "GOVERNED_PATH_DETECTED=$GOVERNED_PATH_DETECTED" >> "$GITHUB_ENV"
          echo "RISK_CLASS=$RISK_CLASS" >> "$GITHUB_ENV"

      - name: Validate reviewer legitimacy
        if: github.event_name != 'merge_group'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          REPO="${{ github.repository }}"

          gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" > pr_reviews_gov.json

          REVIEW_STATUS="UNVERIFIED"
          STALE_REVIEW="false"
          FAILURE_REASONS="[]"
          SCOPE_COVERAGE_VALID="true"

          # A3: require APPROVED review where commit_id == current head SHA (object identity, not timestamp)
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          APPROVED_ON_HEAD=$(jq -c \
            --arg author "$PR_AUTHOR" \
            --arg head_sha "$HEAD_SHA" \
            '[.[] | select(.state == "APPROVED" and .user.login != $author and .commit_id == $head_sha)] | last' \
            pr_reviews_gov.json)

          if [ "$APPROVED_ON_HEAD" != "null" ] && [ -n "$APPROVED_ON_HEAD" ]; then
            REVIEWER_LOGIN=$(echo "$APPROVED_ON_HEAD" | jq -r '.user.login')

            if [ "$RISK_CLASS" = "P3" ]; then
              HAS_AUTHORITY=$(jq --arg reviewer "$REVIEWER_LOGIN" \
                '(.authority_roles.sovereignty_review // []) | map(select(.login == $reviewer)) | length > 0' \
                governance/merge-legitimacy/MERGE_ACTOR_REGISTRY.json)
              if [ "$HAS_AUTHORITY" = "true" ]; then
                # AC5: path-scope coverage — every changed P3 file must match a reviewer scope_path
                REVIEWER_SCOPE_PATHS_JSON=$(jq -c --arg reviewer "$REVIEWER_LOGIN" \
                  '(.authority_roles.sovereignty_review // []) | map(select(.login == $reviewer)) | .[0].scope_paths // []' \
                  governance/merge-legitimacy/MERGE_ACTOR_REGISTRY.json)

                CHANGED_P3_FILES_ARR=()
                while IFS= read -r chfile; do
                  while IFS= read -r p3pat; do
                    if [[ "$chfile" == $p3pat ]]; then
                      CHANGED_P3_FILES_ARR+=("$chfile")
                      break
                    fi
                  done < <(jq -r '.rules[] | select(.risk == "P3") | .patterns[]' \
                    governance/merge-legitimacy/RISK_CLASSIFICATION_RULES.json)
                done < changed_files.txt

                SCOPE_COVERAGE_VALID="true"
                if [ "${#CHANGED_P3_FILES_ARR[@]}" -gt 0 ]; then
                  for p3file in "${CHANGED_P3_FILES_ARR[@]}"; do
                    COVERED="false"
                    while IFS= read -r spath; do
                      if [[ "$p3file" == $spath ]]; then
                        COVERED="true"
                        break
                      fi
                    done < <(echo "$REVIEWER_SCOPE_PATHS_JSON" | jq -r '.[]')
                    if [ "$COVERED" = "false" ]; then
                      SCOPE_COVERAGE_VALID="false"
                      break
                    fi
                  done
                fi

                if [ "$SCOPE_COVERAGE_VALID" = "true" ]; then
                  REVIEW_STATUS="APPROVED"
                else
                  REVIEW_STATUS="LEGITIMACY_NULL"
                  FAILURE_REASONS='["p3_files_outside_reviewer_scope"]'
                fi
              else
                SCOPE_COVERAGE_VALID="false"
                REVIEW_STATUS="LEGITIMACY_NULL"
                FAILURE_REASONS='["reviewer_not_in_sovereignty_review_for_p3"]'
              fi
            else
              REVIEW_STATUS="APPROVED"
            fi
          else
            ANY_APPROVED=$(jq --arg author "$PR_AUTHOR" \
              '[.[] | select(.state == "APPROVED" and .user.login != $author)] | length' \
              pr_reviews_gov.json)
            if [ "$ANY_APPROVED" -gt 0 ]; then
              STALE_REVIEW="true"
              FAILURE_REASONS='["reviewed_head_sha_mismatch"]'
              REVIEW_STATUS="LEGITIMACY_NULL"
            else
              IS_SELF_CERTIFIER=$(jq --arg author "$PR_AUTHOR" \
                '(.single_contributor_policy.permitted_self_certifiers // []) | map(select(. == $author)) | length > 0' \
                governance/merge-legitimacy/MERGE_ACTOR_REGISTRY.json)
              if [ "$IS_SELF_CERTIFIER" = "true" ]; then
                REVIEW_STATUS="OWNER_SELF_CERTIFIED"
              else
                FAILURE_REASONS='["no_approved_review_from_non_author"]'
                REVIEW_STATUS="LEGITIMACY_NULL"
              fi
            fi
          fi

          echo "REVIEW_STATUS=$REVIEW_STATUS" >> "$GITHUB_ENV"
          echo "reviewer_legitimacy_status=$REVIEW_STATUS"

      - name: Generate bound PREO candidate
        if: github.event_name != 'merge_group'
        run: |
          set -euo pipefail

          jq -n \
            --arg preo_id "PREO-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}" \
            --argjson pr_number "${{ github.event.pull_request.number }}" \
            --arg repo "${{ github.repository }}" \
            --arg base_branch "${{ github.base_ref }}" \
            --arg head_branch "${{ github.head_ref }}" \
            --arg head_sha "${{ github.event.pull_request.head.sha }}" \
            --arg review_status "$REVIEW_STATUS" \
            --arg checks_status "UNVERIFIED" \
            --arg risk_class "$RISK_CLASS" \
            --arg governed_path_detected "$GOVERNED_PATH_DETECTED" \
            --arg actor_classification "$ACTOR_CLASSIFICATION" \
            --arg created_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --slurpfile changed_files <(jq -R . changed_files.txt | jq -s .) \
            '{
              preo_id: $preo_id,
              pr_number: $pr_number,
              repo: $repo,
              base_branch: $base_branch,
              head_branch: $head_branch,
              head_sha: $head_sha,
              changed_files: $changed_files[0],
              review_status: $review_status,
              checks_status: $checks_status,
              risk_class: $risk_class,
              governed_path_detected: ($governed_path_detected == "true"),
              actor_classification: $actor_classification,
              created_at: $created_at,
              status: "PREO_CANDIDATE"
            }' > PREO_CANDIDATE.json

      - name: Generate bound SCO candidate
        if: github.event_name != 'merge_group'
        run: |
          set -euo pipefail

          jq -n \
            --arg sco_id "SCO-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}" \
            --argjson pr_number "${{ github.event.pull_request.number }}" \
            --arg repo "${{ github.repository }}" \
            --arg base_branch "${{ github.base_ref }}" \
            --arg head_branch "${{ github.head_ref }}" \
            --arg head_sha "${{ github.event.pull_request.head.sha }}" \
            --arg requires_sco "$GOVERNED_PATH_DETECTED" \
            --arg risk_class "$RISK_CLASS" \
            --arg created_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --slurpfile changed_files <(jq -R . changed_files.txt | jq -s .) \
            --slurpfile governed_files <(jq -R . governed_files.txt | jq -s .) \
            --slurpfile mutation_classes <(jq -R . mutation_classes.txt | jq -s .) \
            --slurpfile target_surfaces <(jq -R . target_surfaces.txt | jq -s .) \
            '{
              sco_id: $sco_id,
              pr_number: $pr_number,
              repo: $repo,
              base_branch: $base_branch,
              head_branch: $head_branch,
              head_sha: $head_sha,
              changed_files: $changed_files[0],
              governed_files: $governed_files[0],
              mutation_classes: $mutation_classes[0],
              target_surfaces: $target_surfaces[0],
              requires_sco: ($requires_sco == "true"),
              risk_class: $risk_class,
              created_at: $created_at,
              status: "SCO_CANDIDATE"
            }' > SCO_CANDIDATE.json

      - name: Enforce append-only GMA registry (Issue #1984)
        if: github.event_name != 'merge_group'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          # Append-only authorization lineage guard.
          #   Issue #1984:     gma_registry.jsonl (per-PR GMA lineage)
          #   GAP-005 Phase 2: standing_authority_registry.jsonl (policy-bound authority lineage)
          #   GAP-005 Phase 2: merge_proof_registry.jsonl (the Standing Authority budget
          #                    ledger — counted by Tier 3, so it must not be rewritten to
          #                    remove proof_entry lines and reopen consumed max_merges).
          # These surfaces are exempt from governed-file detection, so this dedicated guard
          # ensures existing entries can never be modified or removed — the base-branch
          # version must be a byte-exact PREFIX of the head version (new entries only ever
          # appended at the end). Without this, history could be rewritten to preserve a
          # green merge or to free budget.
          for REGISTRY in \
            governance/authorizations/gma_registry.jsonl \
            governance/authorizations/standing_authority_registry.jsonl \
            governance/merge-legitimacy/merge_proof_registry.jsonl
          do
            if ! grep -qxF "$REGISTRY" changed_files.txt 2>/dev/null; then
              echo "$REGISTRY not modified by this PR — append-only check not applicable."
              continue
            fi

            if ! git cat-file -e "${BASE_SHA}:${REGISTRY}" 2>/dev/null; then
              echo "$REGISTRY is newly introduced by this PR — all additions, append-only by construction."
              continue
            fi

            git show "${BASE_SHA}:${REGISTRY}" > registry_base.jsonl

            REGISTRY_PATH="$REGISTRY" node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';
          const registry = process.env.REGISTRY_PATH;
          const base = readFileSync('registry_base.jsonl');
          const head = readFileSync(registry);
          if (head.length < base.length || !head.subarray(0, base.length).equals(base)) {
            console.error(`NULL — ${registry} modified non-append-only: existing entries changed or removed.`);
            console.error('The base-branch registry must be a byte-exact prefix of the head registry (append-only policy).');
            console.error('Result: MERGE_LEGITIMACY_NULL');
            process.exit(1);
          }
          const added = head.subarray(base.length).toString('utf8').split('\n').filter(Boolean).length;
          console.log(`${registry} change is append-only: ${added} new entr${added === 1 ? 'y' : 'ies'} appended.`);
          NODE
          done

      - name: Validate appended standing authority records (GAP-005 Phase 2)
        if: github.event_name != 'merge_group'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          # governance/authorizations/** is exempt from governed-file detection, so a PR
          # that only appends to standing_authority_registry.jsonl would otherwise be
          # checked for append-only growth alone — letting a malformed or forged authority
          # land on the base branch and later authorize governed PRs. Validate the shape
          # and internal consistency (authority_hash recomputed from bounds) of every newly
          # appended record. NOTE: cryptographic issuance provenance (signing) is post-V1;
          # a reviewer must still vet that an appended authority was legitimately issued by
          # the owner-dispatch workflow (documented in STANDING_AUTHORITY_SPEC.json).
          SA_REGISTRY="governance/authorizations/standing_authority_registry.jsonl"

          if ! grep -qxF "$SA_REGISTRY" changed_files.txt 2>/dev/null; then
            echo "standing_authority_registry.jsonl not modified — no SA record validation needed."
            exit 0
          fi

          if git cat-file -e "${BASE_SHA}:${SA_REGISTRY}" 2>/dev/null; then
            git show "${BASE_SHA}:${SA_REGISTRY}" > sa_registry_base_prefix.jsonl
          else
            : > sa_registry_base_prefix.jsonl
          fi
          # Recompute authority_hash with the BASE verifier (never the PR's module).
          if git cat-file -e "${BASE_SHA}:runtime/standing-authority.mjs" 2>/dev/null; then
            git show "${BASE_SHA}:runtime/standing-authority.mjs" > sa_verifier_base.mjs
          else
            : > sa_verifier_base.mjs
          fi

          node --input-type=module <<'NODE'
          import { readFileSync, existsSync } from 'node:fs';

          const base = readFileSync('sa_registry_base_prefix.jsonl', 'utf8');
          const head = readFileSync('governance/authorizations/standing_authority_registry.jsonl', 'utf8');
          // Append-only growth is enforced by the prior step (base is a byte-exact prefix),
          // so the appended records are exactly the head suffix beyond the base length.
          const appended = head.slice(base.length).split('\n').filter(Boolean);

          let computeAuthorityHash = null;
          if (existsSync('sa_verifier_base.mjs') && readFileSync('sa_verifier_base.mjs', 'utf8').trim()) {
            ({ computeAuthorityHash } = await import('./sa_verifier_base.mjs'));
          }

          const fail = (msg) => {
            console.error('NULL — ' + msg);
            console.error('Result: MERGE_LEGITIMACY_NULL (GAP-005 Phase 2)');
            process.exit(1);
          };

          // authority_id is later written into $GITHUB_ENV by merge-proof (STANDING_AUTHORITY_ID=<id>),
          // so it must be a single-line safe token — a newline could inject extra environment
          // variables. Constrain it to the characters the issuer produces (SA-<branch>-<run_id>).
          const SAFE_ID = /^[A-Za-z0-9._\/-]+$/;

          const REQUIRED = ['authority_id', 'authority_hash', 'intent', 'issued_by',
            'source_authority', 'bounds', 'ttl_hours', 'issued_at', 'expires_at',
            'authority_lineage_bound', 'status'];

          for (const line of appended) {
            let rec;
            try { rec = JSON.parse(line); } catch (_) { fail('appended standing authority registry line is not valid JSON.'); }

            if (rec._record_type === 'standing_authority_revocation') {
              for (const f of ['authority_id', 'revoked_by', 'revoked_at']) {
                if (!rec[f]) fail(`revocation record missing required field: ${f}`);
              }
              if (!SAFE_ID.test(rec.authority_id)) fail(`revocation authority_id is not a single-line safe token: ${JSON.stringify(rec.authority_id)}`);
              continue;
            }
            if (rec._record_type !== 'standing_authority') {
              fail(`unknown _record_type in standing authority registry: ${rec._record_type}`);
            }
            for (const f of REQUIRED) {
              if (rec[f] === undefined || rec[f] === null || rec[f] === '') {
                fail(`appended standing authority missing required field: ${f}`);
              }
            }
            if (typeof rec.authority_id !== 'string' || !SAFE_ID.test(rec.authority_id)) {
              fail(`standing authority authority_id is not a single-line safe token: ${JSON.stringify(rec.authority_id)}`);
            }
            if (rec.source_authority !== 'OWNER_WORKFLOW_DISPATCH') {
              fail(`standing authority source_authority must be OWNER_WORKFLOW_DISPATCH, got: ${rec.source_authority}`);
            }
            if (rec.status !== 'STANDING_AUTHORITY_VALID') {
              fail('appended standing authority status must be STANDING_AUTHORITY_VALID.');
            }
            if (rec.authority_lineage_bound !== true) {
              fail('appended standing authority must declare authority_lineage_bound: true.');
            }
            const b = rec.bounds || {};
            if (!b.branch_pattern
              || !Array.isArray(b.mutation_classes) || b.mutation_classes.length === 0
              || !Array.isArray(b.path_globs) || b.path_globs.length === 0
              || !Number.isInteger(b.max_merges) || b.max_merges < 1) {
              fail('appended standing authority bounds are malformed (branch_pattern, mutation_classes, path_globs, max_merges).');
            }
            if (!(new Date(rec.expires_at) > new Date(rec.issued_at))) {
              fail('appended standing authority expires_at must be after issued_at.');
            }
            // expires_at must equal issued_at + ttl_hours exactly. authority_hash covers
            // ttl_hours but not expires_at, so without this a record could declare a short
            // (hashed) TTL yet set expires_at far in the future to extend the hard bound.
            const expectedExpiry = new Date(rec.issued_at).getTime() + Number(rec.ttl_hours) * 3600 * 1000;
            if (new Date(rec.expires_at).getTime() !== expectedExpiry) {
              fail(`appended standing authority expires_at must equal issued_at + ttl_hours (expected ${new Date(expectedExpiry).toISOString()}).`);
            }
            if (computeAuthorityHash) {
              const expected = computeAuthorityHash({
                branch_pattern: b.branch_pattern,
                mutation_classes: b.mutation_classes,
                path_globs: b.path_globs,
                max_merges: b.max_merges,
                ttl_hours: rec.ttl_hours,
                issued_at: rec.issued_at,
              });
              if (expected !== rec.authority_hash) {
                fail(`appended standing authority authority_hash does not match its bounds (expected ${expected}, got ${rec.authority_hash}).`);
              }
            }
          }
          console.log(`Validated ${appended.length} appended standing authority record(s).`);
          NODE

      - name: Validate governance mutation authorization (GAP-005 / Issue #1984)
        if: github.event_name != 'merge_group'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # GAP-005: governance_mutation or workflow_mutation requires a valid GMA.
          # Issue #1984: authorizations are append-only lineage in gma_registry.jsonl,
          # selected by the composite key (branch + governed_files_hash). The legacy
          # singleton GOVERNANCE_MUTATION_AUTHORIZATION.json is retained as a
          # transitional fallback (Phase 2 of the migration), selected by
          # governed_files_hash alone.
          HAS_GOV_MUTATION=$(grep -qE '^(governance_mutation|workflow_mutation)$' mutation_classes.txt 2>/dev/null && echo "true" || echo "false")

          if [ "$HAS_GOV_MUTATION" = "false" ]; then
            echo "No governance_mutation or workflow_mutation detected — GMA not required"
            exit 0
          fi

          # Bootstrap guard (self-limiting, one-time, auditable):
          # If governance-mutation-authorization.yml is absent from the base branch at its exact SHA,
          # this PR is the bootstrap PR that introduces GAP-005 GMA infrastructure.
          # Enforcement is deferred ONLY for this PR. Once merged, the workflow exists on main
          # and all subsequent governance mutation PRs are fully enforced — no follow-up needed.
          if ! git cat-file -e "${BASE_SHA}:.github/workflows/governance-mutation-authorization.yml" 2>/dev/null; then
            echo "GMA_BOOTSTRAP_EXEMPTION — governance-mutation-authorization.yml is absent from base branch at ${BASE_SHA}."
            echo "Classification: SELF_BLOCKING_GMA_BOOTSTRAP (Path A repair — split bootstrap)"
            echo "This PR introduces GAP-005 GMA infrastructure. Enforcement deferred for this PR only."
            echo "After merge to main, governance-mutation-authorization.yml exists on main."
            echo "All subsequent governance/workflow mutations will require a valid GMA."
            echo "Bootstrap exemption is non-reusable and self-limiting."
            exit 0
          fi

          REGISTRY="governance/authorizations/gma_registry.jsonl"
          SINGLETON="governance/authorizations/GOVERNANCE_MUTATION_AUTHORIZATION.json"
          SA_REGISTRY="governance/authorizations/standing_authority_registry.jsonl"
          PROOF_REGISTRY="governance/merge-legitimacy/merge_proof_registry.jsonl"

          # P1 (security): Standing Authorities and the budget ledger are read from the
          # BASE branch only, never the PR checkout. An authority appended within the
          # same PR must not be able to authorize that PR — it must first land on the
          # base branch through governed admission. governance/authorizations/** is
          # exempt from governed-file detection and the append-only guard only proves
          # entries were appended, so reading head here would let an ordinary PR mint a
          # reusable broad authority and self-authorize. Base-only derivation closes that.
          if git cat-file -e "${BASE_SHA}:${SA_REGISTRY}" 2>/dev/null; then
            git show "${BASE_SHA}:${SA_REGISTRY}" > sa_registry_base.jsonl
          else
            : > sa_registry_base.jsonl
          fi
          if git cat-file -e "${BASE_SHA}:${PROOF_REGISTRY}" 2>/dev/null; then
            git show "${BASE_SHA}:${PROOF_REGISTRY}" > proof_registry_base.jsonl
          else
            : > proof_registry_base.jsonl
          fi
          # P1 (verifier integrity): the derivation module is loaded from BASE, never the
          # PR checkout — runtime/*.mjs is not a governed path, so the head version could
          # be rigged to self-authorize. Run the trusted, already-merged verifier.
          if git cat-file -e "${BASE_SHA}:runtime/standing-authority.mjs" 2>/dev/null; then
            git show "${BASE_SHA}:runtime/standing-authority.mjs" > sa_verifier_base.mjs
          else
            : > sa_verifier_base.mjs
          fi

          # P2: a repository that has completed the migration to Standing-Authority-only
          # authorization (no gma_registry, no singleton) must still admit via Tier 3, so
          # a base-branch standing authority also satisfies this prerequisite.
          if [ ! -f "$REGISTRY" ] && [ ! -f "$SINGLETON" ] && [ ! -s sa_registry_base.jsonl ]; then
            echo "NULL — governance/workflow mutation detected but no GMA registry, singleton, or base-branch standing authority found."
            echo "Run .github/workflows/governance-mutation-authorization.yml on this branch to append a GMA entry,"
            echo "or land a Standing Authority on the base branch via .github/workflows/standing-authority-issuance.yml."
            echo "Result: MERGE_LEGITIMACY_NULL (GAP-005 / Issue #1984)"
            exit 1
          fi

          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict';
          import { createHash } from 'node:crypto';
          import { readFileSync, existsSync } from 'node:fs';

          const headRef = process.env.HEAD_REF;
          assert.ok(headRef, 'head ref must be available for branch-bound GMA selection');

          // Compute governed_files_hash for THIS PR's governed diff (unchanged algorithm)
          const governedFiles = readFileSync('governed_files.txt', 'utf8').split('\n').filter(Boolean).sort();
          const parts = governedFiles.map(f => {
            let content;
            try {
              content = readFileSync(f);
            } catch (_) {
              content = Buffer.from('DELETED');
            }
            const hash = createHash('sha256').update(content).digest('hex');
            return `${f}:${hash}`;
          });
          const computedHash = createHash('sha256').update(parts.join('\n')).digest('hex');

          const detectedClasses = readFileSync('mutation_classes.txt', 'utf8')
            .split('\n').filter(Boolean)
            .filter(c => c === 'governance_mutation' || c === 'workflow_mutation');

          const now = new Date();

          // Shared structural/temporal validation for a selected GMA entry.
          function checkEntry(gma) {
            const required = ['gma_id', 'decision_id', 'continuity_id', 'session_id',
              'validated_object_hash', 'governed_files_hash', 'mutation_classes',
              'gm_control_class', 'authority_lineage_bound', 'expires_at', 'status'];
            for (const field of required) {
              assert.ok(gma[field] !== undefined && gma[field] !== null && gma[field] !== '',
                `GMA missing required field: ${field}`);
            }
            assert.equal(gma.status, 'GMA_VALID', 'GMA status must be GMA_VALID');
            assert.ok(new Date(gma.expires_at) > now,
              `GMA has expired at ${gma.expires_at} — rerun governance-mutation-authorization workflow`);
            assert.equal(gma.authority_lineage_bound, true, 'GMA must declare authority_lineage_bound: true');
            assert.equal(gma.governed_files_hash, computedHash,
              `GMA governed_files_hash mismatch.\nExpected: ${computedHash}\nGot: ${gma.governed_files_hash}\nThe GMA was issued for a different set of governed file changes.`);
            const gmaClasses = new Set(gma.mutation_classes);
            for (const cls of detectedClasses) {
              assert.ok(gmaClasses.has(cls), `GMA does not cover detected mutation class: ${cls}`);
            }
          }

          // PRIMARY (Issue #1984): append-only registry, selected by (branch + governed_files_hash).
          // Two PRs may share a governed_files_hash; branch binding makes the registry
          // lineage rather than a shared authorization pool and blocks cross-branch replay.
          const REGISTRY = 'governance/authorizations/gma_registry.jsonl';
          let matched = null;
          let source = null;
          if (existsSync(REGISTRY)) {
            const candidates = readFileSync(REGISTRY, 'utf8').split('\n').filter(Boolean)
              .map(l => { try { return JSON.parse(l); } catch (_) { return null; } })
              .filter(e => e
                && e.governed_files_hash === computedHash
                && e.branch === headRef
                && e.status === 'GMA_VALID'
                && new Date(e.expires_at) > now)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            if (candidates.length > 0) {
              matched = candidates[0];
              source = 'registry (branch+hash)';
            }
          }

          // FALLBACK (transitional, Phase 2): legacy singleton, selected by governed_files_hash.
          // Issue #2010: only a VALID singleton may short-circuit Tier 3. Previously the
          // singleton set `matched` on governed_files_hash alone, so an EXPIRED (or otherwise
          // invalid) singleton claimed the match, suppressed Tier 3 (guarded by `!matched`),
          // and then failed checkEntry — NULLing a PR that a valid Standing Authority would
          // have authorized. Apply the same temporal/status gates as the registry path before
          // accepting the singleton, so an invalid singleton falls through to Tier 3.
          const SINGLETON = 'governance/authorizations/GOVERNANCE_MUTATION_AUTHORIZATION.json';
          if (!matched && existsSync(SINGLETON)) {
            try {
              const gma = JSON.parse(readFileSync(SINGLETON, 'utf8'));
              if (gma.governed_files_hash === computedHash
                  && gma.status === 'GMA_VALID'
                  && gma.authority_lineage_bound === true
                  && new Date(gma.expires_at) > now) {
                matched = gma;
                source = 'singleton-fallback';
              }
            } catch (_) { /* malformed singleton ignored — registry is authoritative */ }
          }

          // TIER 3 (Policy-Bound GMA — Standing Authority derivation, GAP-005 Phase 2):
          // If no explicit GMA matches, evaluate the governed diff against the
          // BASE-branch standing authority registry (sa_registry_base.jsonl, extracted
          // from BASE_SHA in the shell preamble — never the PR checkout, so a PR-local
          // authority cannot authorize its own PR). A valid, in-scope, non-expired,
          // non-exhausted Standing Authority derives a scoped authorization for a
          // bounded CLASS of mutations (branch + class + path + TTL + budget), so the
          // owner authorizes once instead of per PR. The merge proof later stamps
          // standing_authority_id, consuming the proof-ledger budget. The budget is
          // counted from the base-branch proof ledger (proof_registry_base.jsonl) so a
          // PR cannot rewrite the ledger to free budget.
          // The derivation logic itself is loaded from the BASE branch
          // (sa_verifier_base.mjs, extracted from BASE_SHA), never the PR checkout:
          // runtime/*.mjs is not a governed path, so importing the head version would
          // run the PR's own (possibly rigged) authorization code to decide whether the
          // PR is authorized. Loading the base verifier closes that TOCTOU.
          // Guarded by the base registry AND base verifier existing+non-empty, so the
          // standalone validator extraction test (issue-1984) — which has neither —
          // never attempts the import.
          // Fork safety: head.ref is only a branch name, so a base-repo authority for
          // claude/* would otherwise match a fork branch named claude/foo. A Standing
          // Authority is for the repository's own automation branches, so derivation is
          // refused for PRs originating from a different head repository (fork).
          const isFork = process.env.HEAD_REPO && process.env.BASE_REPO
            && process.env.HEAD_REPO !== process.env.BASE_REPO;
          if (!matched && isFork) {
            console.error(`Standing-authority derivation declined: fork PR (head repo ${process.env.HEAD_REPO} != ${process.env.BASE_REPO}) — explicit GMA required.`);
          }
          // HARD DENY: the Standing Authority trust surfaces must NEVER be authorized by a
          // Standing Authority — that would let a broad SA (e.g. governance/**, runtime/**,
          // or .github/workflows/**) widen/disable the authority layer it derives from.
          // Editing any of them always falls through to an explicit manual GMA. This is an
          // absolute rule, independent of any SA's path_globs. Covers (1) the SA registry,
          // (2) the derivation verifier, plus the two authority-minting issuer workflows:
          // (3) governance-mutation-authorization.yml (mints explicit GMAs) and
          // (4) standing-authority-issuance.yml (issues Standing Authorities) — a
          // workflow-scoped SA must not edit the machinery that grants authority (issue #2008).
          const TRUST_SURFACES = new Set([
            'governance/authorizations/standing_authority_registry.jsonl',
            'runtime/standing-authority.mjs',
            '.github/workflows/governance-mutation-authorization.yml',
            '.github/workflows/standing-authority-issuance.yml',
          ]);
          const touchesTrustSurface = governedFiles.some((f) => TRUST_SURFACES.has(f));
          if (!matched && touchesTrustSurface) {
            console.error('Standing-authority derivation declined: PR edits a Standing Authority trust surface (registry or verifier) — explicit GMA required (never SA-derivable).');
          }
          if (!matched && !isFork && !touchesTrustSurface && existsSync('sa_registry_base.jsonl') && existsSync('sa_verifier_base.mjs')) {
            const saRegistryText = readFileSync('sa_registry_base.jsonl', 'utf8');
            const verifierText = readFileSync('sa_verifier_base.mjs', 'utf8');
            if (saRegistryText.trim() && verifierText.trim()) {
              const { selectStandingAuthority } = await import('./sa_verifier_base.mjs');
              const proofRegistryText = existsSync('proof_registry_base.jsonl')
                ? readFileSync('proof_registry_base.jsonl', 'utf8') : '';
              // Path containment applies only to files whose mutation requires GMA
              // authorization (governance_mutation / workflow_mutation). proof_persistence
              // (merge_proof_registry.jsonl) and non-gated classes (src/schema/migration/
              // deployment_config) are excluded so an in-scope PR that also touches such a
              // file is not falsely declined. (Trust-surface paths can never reach here —
              // they are hard-denied above.)
              const isAuthGated = (f) =>
                f.startsWith('.github/workflows/')
                || (f.startsWith('governance/')
                    && !f.startsWith('governance/authorizations/')
                    && !/^governance\/operational-risk\/[^/]+\.md$/.test(f)
                    && f !== 'governance/merge-legitimacy/merge_proof_registry.jsonl');
              const authFiles = governedFiles.filter(isAuthGated);
              const sel = selectStandingAuthority({
                registryText: saRegistryText,
                headRef,
                governedFiles: authFiles,
                detectedClasses,
                now,
                proofRegistryText,
              });
              if (sel.authorized) {
                console.log(`GMA_VALID: derived (source: standing-authority-derivation; authority_id=${sel.authority.authority_id})`);
                console.log(`branch: ${headRef}`);
                console.log(`bounds: ${JSON.stringify(sel.authority.bounds)}`);
                console.log('Result: GMA_VALID — governance mutation authorized via Standing Authority (GAP-005 Phase 2, policy-bound).');
                process.exit(0);
              }
              console.error('Standing-authority derivation declined: ' + sel.reason);
            }
          }

          if (!matched) {
            console.error("NULL — no valid GMA for this PR's governed diff.");
            console.error(`computed governed_files_hash: ${computedHash}`);
            console.error(`branch: ${headRef}`);
            console.error('Append a GMA via .github/workflows/governance-mutation-authorization.yml on this branch,');
            console.error('or authorize a class of mutations via .github/workflows/standing-authority-issuance.yml (policy-bound GMA).');
            console.error('Result: MERGE_LEGITIMACY_NULL (GAP-005 / Issue #1984)');
            process.exit(1);
          }

          checkEntry(matched);

          console.log(`GMA_VALID: ${matched.gma_id} (source: ${source})`);
          console.log(`governed_files_hash: ${matched.governed_files_hash}`);
          console.log(`branch: ${matched.branch || '(legacy singleton, unbound)'}`);
          console.log(`decision_id: ${matched.decision_id}`);
          console.log('Result: GMA_VALID — governance mutation authorized via append-only lineage (GAP-005 / Issue #1984)');
          NODE

      - name: Validate PREO/SCO binding
        if: github.event_name != 'merge_group'
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict';
          import { readFileSync } from 'node:fs';

          const preo = JSON.parse(readFileSync('PREO_CANDIDATE.json', 'utf8'));
          const sco = JSON.parse(readFileSync('SCO_CANDIDATE.json', 'utf8'));
          const changedFiles = readFileSync('changed_files.txt', 'utf8').split('\n').filter(Boolean).sort();
          const governedFiles = readFileSync('governed_files.txt', 'utf8').split('\n').filter(Boolean).sort();
          const currentHeadSha = '${{ github.event.pull_request.head.sha }}';

          assert.equal(preo.status, 'PREO_CANDIDATE');
          assert.equal(sco.status, 'SCO_CANDIDATE');
          assert.equal(preo.head_sha, currentHeadSha, 'PREO head_sha must match current PR head SHA');
          assert.equal(sco.head_sha, currentHeadSha, 'SCO head_sha must match current PR head SHA');
          assert.deepEqual([...preo.changed_files].sort(), changedFiles, 'PREO changed_files must match actual changed files');
          assert.deepEqual([...sco.changed_files].sort(), changedFiles, 'SCO changed_files must match actual changed files');
          assert.deepEqual([...sco.governed_files].sort(), governedFiles, 'SCO governed_files must match actual governed files');

          if (governedFiles.length > 0) {
            assert.equal(sco.requires_sco, true, 'SCO must be required when governed files changed');
            assert.equal(preo.governed_path_detected, true, 'PREO must detect governed path changes');
          }
          NODE

      - name: Validate merge governance declarations
        run: |
          set -euo pipefail

          for file in \
            governance/runtime/PREO_REQUIREMENTS.json \
            governance/runtime/SCO_REQUIREMENTS.json \
            governance/runtime/MERGE_GOVERNANCE_RULES.json \
            governance/runtime/AGENT_EXECUTION_GOVERNANCE_MODEL.json \
            governance/runtime/BRANCH_PROTECTION_POLICY.json \
            runtime/governance/TOPOLOGY_RECONCILIATION_POLICY.json
          do
            if [ ! -f "$file" ]; then
              echo "NULL — missing merge governance artifact: $file"
              exit 1
            fi
            node -e "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8'))" "$file"
          done

          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict';
          import { readdirSync, readFileSync } from 'node:fs';
          import { join } from 'node:path';

          const merge = JSON.parse(readFileSync('governance/runtime/MERGE_GOVERNANCE_RULES.json', 'utf8'));
          const branch = JSON.parse(readFileSync('governance/runtime/BRANCH_PROTECTION_POLICY.json', 'utf8'));
          const topologyPolicy = JSON.parse(readFileSync('runtime/governance/TOPOLOGY_RECONCILIATION_POLICY.json', 'utf8'));
          const rules = merge.rules.join('\n');

          function emittedCheckNames() {
            return new Set(
              readdirSync('.github/workflows')
                .filter((file) => file.endsWith('.yml'))
                .flatMap((file) => {
                  const source = readFileSync(join('.github/workflows', file), 'utf8');
                  const jobsBlock = source.match(/^jobs:\s*$([\s\S]*)/m)?.[1] ?? '';
                  return [...jobsBlock.matchAll(/^  ([A-Za-z0-9_-]+):\s*$/gm)].map((match) => match[1]);
                }),
            );
          }

          assert.ok(rules.includes('No PREO -> no governed merge'), 'merge rules must require PREO');
          assert.ok(rules.includes('No PREO_VALID -> no merge legitimacy'), 'merge rules must require PREO_VALID legitimacy');
          assert.ok(rules.includes('Governance/runtime mutation -> requires SCO'), 'merge rules must require SCO');
          assert.ok(Array.isArray(merge.required_proof_fields), 'merge proof requirements must be declared');
          assert.ok(merge.required_proof_fields.includes('merge_commit_sha'), 'merge proof must require merge_commit_sha');
          assert.equal(merge.topology_reconciliation.evidence_only, true, 'topology reconciliation must be evidence-only');
          assert.equal(merge.topology_reconciliation.direct_merge_authority, false, 'topology reconciliation cannot grant direct merge authority');
          assert.deepEqual(topologyPolicy.canonical_traversal_order, ['runtime_routes', 'execution_surfaces', 'observability_surfaces', 'governance_inventories', 'schema_maps', 'workflow_topology', 'proof_lineage_bindings']);
          assert.ok(topologyPolicy.merge_signals.includes('SAFE_TO_MERGE'), 'topology reconciliation merge signal must be declared');

          const emitted = emittedCheckNames();
          const required = branch.required_controls.required_status_checks;
          const missing = required.filter((checkName) => !emitted.has(checkName));
          assert.deepEqual(missing, [], `required branch protection checks must be emitted workflow jobs: ${missing.join(', ')}`);
          NODE

      - name: Emit topology reconciliation merge signal
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          import { reconcileTopology } from './runtime/reconciliation/topology-reconciliation-engine.js';

          const readJson = (path) => JSON.parse(readFileSync(path, 'utf8'));
          const runtimeGraph = readJson('runtime/topology/runtime_graph.json');
          const executionSurfaces = readJson('runtime/surfaces/EXECUTION_SURFACES.json');
          const observabilitySurfaces = readJson('runtime/surfaces/OBSERVABILITY_SURFACES.json');
          const schemaSourceMap = readJson('runtime/topology/schema_source_map.json');
          const mergeGovernance = readJson('governance/runtime/MERGE_GOVERNANCE_RULES.json');

          const topology = {
            runtime_routes: runtimeGraph.nodes,
            execution_surfaces: executionSurfaces.surfaces,
            observability_surfaces: observabilitySurfaces.surfaces,
            governance_inventories: [{ id: 'merge_governance_rules', current: true, required_routes: runtimeGraph.canonical_lifecycle }],
            schema_maps: schemaSourceMap.sources,
            workflow_topology: [{ id: 'governed_deploy_workflow', workflow: 'governed-deploy.yml', declared: true, expands_execution: false }],
            proof_lineage_bindings: [{ id: 'merge_governance_rules', path: 'governance/runtime/MERGE_GOVERNANCE_RULES.json', hash_bound: true }],
            topology_ancestry: [mergeGovernance.topology_reconciliation.policy],
          };
          const evidence = reconcileTopology(topology, { generated_at: new Date(0).toISOString(), maxNodes: 256 });
          writeFileSync('TOPOLOGY_RECONCILIATION_SIGNAL.json', JSON.stringify({
            reconciliation_id: evidence.reconciliation_id,
            classification: evidence.classification,
            merge_signal: evidence.merge_signal,
            evidence_only: evidence.evidence_only,
            remote_authority_denied: evidence.remote_authority_denied,
            replay_neutral: evidence.replay_neutral,
            mutation_capable: evidence.mutation_capable,
            direct_merge_authority: false,
          }, null, 2));

          if (evidence.merge_signal !== 'SAFE_TO_MERGE') {
            console.error(`NULL — topology reconciliation merge signal: ${evidence.merge_signal}`);
            process.exit(1);
          }
          NODE

      - name: Upload merge governance candidates
        if: github.event_name != 'merge_group'
        uses: actions/upload-artifact@v4
        with:
          name: MERGE_GOVERNANCE_CANDIDATES
          path: |
            PREO_CANDIDATE.json
            SCO_CANDIDATE.json
            TOPOLOGY_RECONCILIATION_SIGNAL.json
            changed_files.txt
            governed_files.txt

      - name: Emit merge governance summary
        if: github.event_name != 'merge_group'
        run: |
          set -euo pipefail
          {
            echo "### Merge Governance Check"
            echo ""
            echo "governed_path_detected=$GOVERNED_PATH_DETECTED"
            echo "risk_class=$RISK_CLASS"
            echo "actor_classification=$ACTOR_CLASSIFICATION"
            echo ""
            echo "#### PREO_CANDIDATE.json"
            echo '```json'
            cat PREO_CANDIDATE.json
            echo '```'
            echo ""
            echo "#### SCO_CANDIDATE.json"
            echo '```json'
            cat SCO_CANDIDATE.json
            echo '```'
            echo ""
            echo "#### TOPOLOGY_RECONCILIATION_SIGNAL.json"
            echo '```json'
            cat TOPOLOGY_RECONCILIATION_SIGNAL.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
