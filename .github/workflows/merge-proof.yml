name: merge-proof

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  generate-merge-proof:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Fetch PR reviews
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          REPO="${{ github.repository }}"

          gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" > pr_reviews.json

          VALID_APPROVED=$(jq --arg author "$PR_AUTHOR" \
            '[.[] | select(.state == "APPROVED" and .user.login != $author)] | length' \
            pr_reviews.json)

          if [ "$VALID_APPROVED" -gt 0 ]; then
            LATEST_REVIEW=$(jq -c --arg author "$PR_AUTHOR" \
              '[.[] | select(.state == "APPROVED" and .user.login != $author)] | sort_by(.submitted_at) | last' \
              pr_reviews.json)
            REVIEWER=$(echo "$LATEST_REVIEW" | jq -r '.user.login')
            REVIEW_TS=$(echo "$LATEST_REVIEW" | jq -r '.submitted_at')

            COMMITS_AFTER=$(gh api "repos/$REPO/pulls/$PR_NUMBER/commits" | \
              jq --arg ts "$REVIEW_TS" '[.[] | select(.commit.committer.date > $ts)] | length')

            if [ "$COMMITS_AFTER" -gt 0 ]; then
              echo "REVIEW_STATUS=STALE_APPROVAL" >> "$GITHUB_ENV"
            else
              echo "REVIEW_STATUS=APPROVED" >> "$GITHUB_ENV"
            fi
            echo "REVIEWER_LOGIN=$REVIEWER" >> "$GITHUB_ENV"
            echo "REVIEW_SUBMITTED_AT=$REVIEW_TS" >> "$GITHUB_ENV"
          else
            echo "REVIEW_STATUS=PENDING" >> "$GITHUB_ENV"
            echo "REVIEWER_LOGIN=" >> "$GITHUB_ENV"
            echo "REVIEW_SUBMITTED_AT=" >> "$GITHUB_ENV"
          fi

      - name: Generate merge proof
        run: |
          set -euo pipefail

          MERGE_COMMIT_SHA="${{ github.event.pull_request.merge_commit_sha }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          MERGED_BY="${{ github.event.pull_request.merged_by.login }}"
          MERGED_AT="${{ github.event.pull_request.merged_at }}"
          NONCE=$(cat /proc/sys/kernel/random/uuid)
          PREO_ID="PREO-${PR_NUMBER}-${HEAD_SHA}"
          PROOF_ID="PROOF-${PR_NUMBER}-${MERGE_COMMIT_SHA:0:8}"
          GENERATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          jq -n \
            --arg proof_id "$PROOF_ID" \
            --argjson pr_number "$PR_NUMBER" \
            --arg repo "${{ github.repository }}" \
            --arg base_branch "${{ github.event.pull_request.base.ref }}" \
            --arg head_branch "${{ github.event.pull_request.head.ref }}" \
            --arg head_sha "$HEAD_SHA" \
            --arg merge_commit_sha "$MERGE_COMMIT_SHA" \
            --arg review_status "$REVIEW_STATUS" \
            --arg reviewer_identity "$REVIEWER_LOGIN" \
            --arg review_submitted_at "$REVIEW_SUBMITTED_AT" \
            --arg checks_status "UNVERIFIED" \
            --arg preo_id "$PREO_ID" \
            --arg preo_head_sha "$HEAD_SHA" \
            --arg preo_status "UNVERIFIED" \
            --arg merged_by "${MERGED_BY:-unknown}" \
            --arg merged_at "${MERGED_AT:-}" \
            '{
              proof_id: $proof_id,
              pr_number: $pr_number,
              repo: $repo,
              base_branch: $base_branch,
              head_branch: $head_branch,
              head_sha: $head_sha,
              merge_commit_sha: $merge_commit_sha,
              review_status: $review_status,
              reviewer_identity: $reviewer_identity,
              review_submitted_at: $review_submitted_at,
              checks_status: $checks_status,
              preo_id: $preo_id,
              preo_head_sha: $preo_head_sha,
              preo_status: $preo_status,
              merged_by: $merged_by,
              merged_at: $merged_at,
              record_type: "MERGE_PROOF"
            }' > MERGE_PROOF_CANONICAL.json

          CANONICAL_HASH=$(sha256sum MERGE_PROOF_CANONICAL.json | cut -d' ' -f1)

          jq \
            --arg canonical_hash "$CANONICAL_HASH" \
            --arg invocation_nonce "$NONCE" \
            --arg generated_at "$GENERATED_AT" \
            '. + {canonical_hash: $canonical_hash, invocation_nonce: $invocation_nonce, generated_at: $generated_at}' \
            MERGE_PROOF_CANONICAL.json > MERGE_PROOF.json

          echo "PROOF_HASH=$CANONICAL_HASH" >> "$GITHUB_ENV"
          echo "PR_NUMBER_FOR_COMMIT=$PR_NUMBER" >> "$GITHUB_ENV"

      - name: Append proof to registry
        run: |
          set -euo pipefail

          PROOF_ID=$(jq -r .proof_id MERGE_PROOF.json)
          MERGE_COMMIT_SHA=$(jq -r .merge_commit_sha MERGE_PROOF.json)
          MERGED_AT=$(jq -r .merged_at MERGE_PROOF.json)
          PR_NUMBER=$(jq -r .pr_number MERGE_PROOF.json)

          jq -cn \
            --arg proof_id "$PROOF_ID" \
            --arg proof_hash "$PROOF_HASH" \
            --argjson pr_number "$PR_NUMBER" \
            --arg merge_commit_sha "$MERGE_COMMIT_SHA" \
            --arg merged_at "$MERGED_AT" \
            --arg appended_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              _record_type: "proof_entry",
              proof_id: $proof_id,
              proof_hash: $proof_hash,
              pr_number: $pr_number,
              merge_commit_sha: $merge_commit_sha,
              merged_at: $merged_at,
              appended_at: $appended_at
            }' >> governance/merge-legitimacy/merge_proof_registry.jsonl

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add governance/merge-legitimacy/merge_proof_registry.jsonl
          if git diff --cached --quiet; then
            echo "No registry changes detected; entry may already be present"
            exit 0
          fi
          git commit -m "proof: append merge proof entry for PR #${PR_NUMBER_FOR_COMMIT}"

          MAX_RETRIES=5
          for attempt in $(seq 1 $MAX_RETRIES); do
            git pull --rebase origin main
            if git push; then
              echo "Proof registry push succeeded on attempt $attempt"
              exit 0
            fi
            if [ "$attempt" -lt "$MAX_RETRIES" ]; then
              SLEEP_TIME=$((2 ** attempt))
              echo "Push failed on attempt $attempt, retrying in ${SLEEP_TIME}s..."
              sleep "$SLEEP_TIME"
            fi
          done
          echo "NULL — proof registry push failed after $MAX_RETRIES attempts; proof entry not persisted"
          exit 1

      - name: Upload merge proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: MERGE_PROOF
          path: MERGE_PROOF.json

      - name: Emit merge proof summary
        run: |
          set -euo pipefail
          {
            echo "### Merge Proof Generated"
            echo ""
            echo "proof_hash: $PROOF_HASH"
            echo ""
            echo '```json'
            cat MERGE_PROOF.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
