name: governance-mutation-authorization
# owner: #1831
# policy: GAP-005 — Governance Self-Mutation Containment (V1 local-deterministic model)
# policy-path: governance/authorizations/GOVERNANCE_MUTATION_AUTHORIZATION_SPEC.json
# gap-reference: GAP-005
#
# V1 CONTAINMENT MODEL:
# Governance mutations require owner workflow_dispatch + governed_files_hash binding.
# No external Worker call. No PREFLIGHT. Purely repo-side and deterministic.
#
# External canonical lifecycle issuance (/session → /continuity → /authority → /compile)
# is SEQUENCED for post-V1 once WORKER_URL / API_KEY authorization is restored.
#
# What this produces:
#   governed_files_hash  — sha256-bound to exact governed file contents (repo-verifiable)
#   mutation_classes     — declared, CI-verified
#   owner dispatch       — explicit, auditable (github.actor + workflow_dispatch event)
#   append-only proof    — GMA artifact committed to branch
#
# What this does NOT produce:
#   canonical runtime lifecycle execution proof
#   /execute → /proof lineage
#   decision_id / continuity_id from external runtime

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: 'Base branch to diff governed files against (default: main)'
        required: false
        default: 'main'
      intent:
        description: 'Brief description of the governance mutation being authorized'
        required: true

permissions:
  contents: write
  actions: read

jobs:
  create-governance-mutation-authorization:
    if: ${{ !startsWith(github.ref_name, 'proof-registry/') }}
    runs-on: ubuntu-latest

    env:
      BASE_REF: ${{ inputs.base_ref || 'main' }}
      MUTATION_INTENT: ${{ inputs.intent }}
      WORKFLOW_RUN_ID: ${{ github.run_id }}
      WORKFLOW_SHA: ${{ github.sha }}
      WORKFLOW_REF_NAME: ${{ github.ref_name }}
      GITHUB_ACTOR: ${{ github.actor }}

    steps:
      - name: HARD FAIL — Guard against non-dispatch invocation
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "NULL — Only explicit workflow_dispatch invocation allowed"
            exit 1
          fi

          if [ -z "${MUTATION_INTENT:-}" ]; then
            echo "NULL — intent input is required"
            exit 1
          fi

          echo "Dispatch authorized by ${{ github.actor }} on ${{ github.ref_name }}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute governed files and hash
        run: |
          set -euo pipefail

          git fetch origin "$BASE_REF" --depth=1

          git diff --name-only "origin/$BASE_REF" HEAD > gma_changed_files.txt || true

          : > gma_governed_files.txt
          : > gma_mutation_classes.txt

          while IFS= read -r file; do
            case "$file" in
              governance/authorizations/standing_authority_registry.jsonl)
                # GAP-005 Phase 2: Standing Authority registry is a governance_mutation
                # (must precede the governance/authorizations/* exemption). Keep this
                # classifier byte-for-byte aligned with merge-governance-check.yml so the
                # governed_files_hash matches.
                echo "$file" >> gma_governed_files.txt
                echo "governance_mutation" >> gma_mutation_classes.txt
                ;;
              governance/authorizations/*)
                # GMA artifacts are exempt — not governance primitives
                ;;
              runtime/standing-authority.mjs)
                # GAP-005 Phase 2: Standing Authority derivation verifier is governed.
                echo "$file" >> gma_governed_files.txt
                echo "governance_mutation" >> gma_mutation_classes.txt
                ;;
              governance/merge-legitimacy/merge_proof_registry.jsonl)
                echo "$file" >> gma_governed_files.txt
                echo "proof_persistence" >> gma_mutation_classes.txt
                ;;
              governance/operational-risk/*.md)
                # Evidence-only operational-risk audit artifacts (GAP-005 parity).
                # Keep this classifier byte-for-byte aligned with merge-governance-check.yml
                # and merge-proof.yml so governed_files_hash and mutation_classes match.
                echo "$file" >> gma_governed_files.txt
                echo "operational_risk_evidence" >> gma_mutation_classes.txt
                ;;
              governance/*)
                echo "$file" >> gma_governed_files.txt
                echo "governance_mutation" >> gma_mutation_classes.txt
                ;;
              .github/workflows/*)
                echo "$file" >> gma_governed_files.txt
                echo "workflow_mutation" >> gma_mutation_classes.txt
                ;;
              src/*)
                echo "$file" >> gma_governed_files.txt
                echo "runtime_mutation" >> gma_mutation_classes.txt
                ;;
              schema.sql)
                echo "$file" >> gma_governed_files.txt
                echo "schema_mutation" >> gma_mutation_classes.txt
                ;;
              migrations/*)
                echo "$file" >> gma_governed_files.txt
                echo "migration_mutation" >> gma_mutation_classes.txt
                ;;
              wrangler.toml)
                echo "$file" >> gma_governed_files.txt
                echo "deployment_config_mutation" >> gma_mutation_classes.txt
                ;;
            esac
          done < gma_changed_files.txt

          sort -u gma_governed_files.txt -o gma_governed_files.txt
          sort -u gma_mutation_classes.txt -o gma_mutation_classes.txt

          echo "Governed files:"
          cat gma_governed_files.txt

          echo "Mutation classes:"
          cat gma_mutation_classes.txt

          # Compute governed_files_hash using same algorithm as merge-governance-check.yml
          node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto';
          import { readFileSync, writeFileSync } from 'node:fs';

          const governedFiles = readFileSync('gma_governed_files.txt', 'utf8')
            .split('\n').filter(Boolean).sort();

          const parts = governedFiles.map(f => {
            let content;
            try { content = readFileSync(f); }
            catch (_) { content = Buffer.from('DELETED'); }
            const hash = createHash('sha256').update(content).digest('hex');
            return `${f}:${hash}`;
          });

          const combined = parts.join('\n');
          const governed_files_hash = createHash('sha256').update(combined).digest('hex');

          writeFileSync('governed_files_hash.txt', governed_files_hash);
          console.log(`governed_files_hash: ${governed_files_hash}`);
          NODE

      - name: Generate local GMA artifact
        run: |
          set -euo pipefail

          GOVERNED_FILES_HASH=$(cat governed_files_hash.txt)
          HEAD_SHA=$(git rev-parse HEAD)
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EXPIRY=$(date -u -d "+1 year" +"%Y-%m-%dT%H:%M:%SZ" 2>/dev/null || date -u -v+1y +"%Y-%m-%dT%H:%M:%SZ")

          # Deterministic local lineage IDs derived from known inputs (no external runtime)
          GMA_ID="GMA-${WORKFLOW_REF_NAME}-${WORKFLOW_RUN_ID}"
          SESSION_ID=$(printf '%s' "${{ github.repository }}|${{ github.actor }}|${WORKFLOW_RUN_ID}" | sha256sum | awk '{print $1}')
          CONTINUITY_ID=$(printf '%s' "${SESSION_ID}|${HEAD_SHA}" | sha256sum | awk '{print $1}')
          DECISION_ID=$(printf '%s' "${CONTINUITY_ID}|${GOVERNED_FILES_HASH}" | sha256sum | awk '{print $1}')
          VALIDATED_OBJECT_HASH=$(printf '%s' "${DECISION_ID}|${GOVERNED_FILES_HASH}" | sha256sum | awk '{print $1}')

          # Build mutation_classes JSON array
          CLASSES_JSON=$(jq -R . gma_mutation_classes.txt | jq -sc '.')
          GOVERNED_FILES_JSON=$(jq -R . gma_governed_files.txt | jq -sc '.')

          node --input-type=module <<NODE
          import { writeFileSync, appendFileSync, existsSync, readFileSync } from 'node:fs';

          const gma = {
            gma_id: "${GMA_ID}",
            decision_id: "${DECISION_ID}",
            continuity_id: "${CONTINUITY_ID}",
            session_id: "${SESSION_ID}",
            validated_object_hash: "${VALIDATED_OBJECT_HASH}",
            governed_files_hash: "${GOVERNED_FILES_HASH}",
            governed_files: ${GOVERNED_FILES_JSON},
            mutation_classes: ${CLASSES_JSON},
            gm_control_class: "GOVERNANCE_CONTAINED",
            issuance_method: "LOCAL_DETERMINISTIC",
            canonical_lifecycle_executed: false,
            canonical_lifecycle_note: "V1 local-deterministic model. External runtime lifecycle (/session → /continuity → /authority → /compile) is SEQUENCED for post-V1. governed_files_hash provides repo-verifiable content binding. Owner workflow_dispatch provides explicit authorization.",
            intent: "${MUTATION_INTENT}",
            authorized_by: "${{ github.actor }}",
            authority_lineage_bound: true,
            repo: "${{ github.repository }}",
            branch: "${WORKFLOW_REF_NAME}",
            head_sha: "${HEAD_SHA}",
            workflow_run_id: "${WORKFLOW_RUN_ID}",
            created_at: "${NOW}",
            expires_at: "${EXPIRY}",
            status: "GMA_VALID"
          };

          // Issue #1984 — Phase 1 dual-write:
          //  (1) legacy singleton: transitional fallback for merge-governance-check
          //  (2) append-only registry: primary selection surface, keyed by
          //      (branch + governed_files_hash); immutable lineage, no overwrite.
          writeFileSync(
            'governance/authorizations/GOVERNANCE_MUTATION_AUTHORIZATION.json',
            JSON.stringify(gma, null, 2) + '\n'
          );

          const REGISTRY = 'governance/authorizations/gma_registry.jsonl';
          const existing = existsSync(REGISTRY) ? readFileSync(REGISTRY, 'utf8') : '';
          const duplicate = existing.split('\n').filter(Boolean).some(line => {
            try {
              const e = JSON.parse(line);
              return e.gma_id === gma.gma_id
                || (e.governed_files_hash === gma.governed_files_hash
                    && e.branch === gma.branch
                    && e.status === 'GMA_VALID');
            } catch (_) { return false; }
          });
          if (duplicate) {
            console.log('GMA entry already present for this gma_id or (governed_files_hash, branch) — append skipped (idempotent).');
          } else {
            appendFileSync(REGISTRY, JSON.stringify(gma) + '\n');
            console.log('GMA entry appended to append-only registry.');
          }

          console.log('GMA written (singleton + registry).');
          console.log('gma_id:', gma.gma_id);
          console.log('governed_files_hash:', gma.governed_files_hash);
          console.log('gm_control_class:', gma.gm_control_class);
          console.log('issuance_method:', gma.issuance_method);
          NODE

      - name: Commit and push GMA artifact
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add governance/authorizations/GOVERNANCE_MUTATION_AUTHORIZATION.json
          git add governance/authorizations/gma_registry.jsonl

          if git diff --cached --quiet; then
            echo "No changes to GMA artifact — hash unchanged."
            exit 0
          fi

          GMA_ID=$(node -e "const g=require('./governance/authorizations/GOVERNANCE_MUTATION_AUTHORIZATION.json'); console.log(g.gma_id)")
          HASH=$(node -e "const g=require('./governance/authorizations/GOVERNANCE_MUTATION_AUTHORIZATION.json'); console.log(g.governed_files_hash)")

          git commit -m "gma: local-deterministic authorization ${GMA_ID}

          governed_files_hash: ${HASH}
          authorized_by: ${{ github.actor }}
          issuance_method: LOCAL_DETERMINISTIC
          canonical_lifecycle_executed: false"

          git push origin HEAD:"$WORKFLOW_REF_NAME"
          echo "GMA committed and pushed."

      - name: Summary
        run: |
          echo "=== GMA Summary ==="
          echo "gm_control_class: GOVERNANCE_CONTAINED"
          echo "issuance_method: LOCAL_DETERMINISTIC"
          echo "canonical_lifecycle_executed: false"
          echo "governed_files_hash: $(cat governed_files_hash.txt)"
          echo ""
          echo "Content binding: governed_files_hash is repo-verifiable."
          echo "Canonical runtime proof: NOT produced (V1 model)."
          echo "External runtime lifecycle: SEQUENCED for post-V1."
          echo "=== End Summary ==="
