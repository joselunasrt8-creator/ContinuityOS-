name: mindshift-pr-validate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr:
    name: mindshift-pr-validate
    runs-on: ubuntu-latest

    env:
      WORKER_URL: ${{ secrets.MINDSHIFT_WORKER_URL }}
      API_KEY: ${{ secrets.MINDSHIFT_API_KEY }}

    steps:
      - name: HARD FAIL — Missing secrets
        run: |
          set -euo pipefail

          for var in WORKER_URL API_KEY; do
            if [ -z "${!var:-}" ]; then
              echo "NULL — Missing required secret: $var"
              exit 1
            fi
          done

          CLEAN_WORKER_URL="${WORKER_URL%/}"
          if [ -z "$CLEAN_WORKER_URL" ]; then
            echo "NULL — Invalid WORKER_URL"
            exit 1
          fi

          echo "CLEAN_WORKER_URL=$CLEAN_WORKER_URL" >> "$GITHUB_ENV"

      - name: VALIDATE PR — Fail closed
        run: |
          set -euo pipefail

          PAYLOAD=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg pr_number "${{ github.event.pull_request.number }}" \
            --arg base_branch "${{ github.event.pull_request.base.ref }}" \
            --arg head_branch "${{ github.event.pull_request.head.ref }}" \
            --arg commit_sha "${{ github.event.pull_request.head.sha }}" \
            '{repo: $repo, pr_number: $pr_number, base_branch: $base_branch, head_branch: $head_branch, commit_sha: $commit_sha}')

          RESPONSE_CODE=$(curl -sS -o pr-validate.json -w "%{http_code}" \
            -X POST "$CLEAN_WORKER_URL/validate-pr" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $API_KEY" \
            -d "$PAYLOAD")

          if [ "$RESPONSE_CODE" -lt 200 ] || [ "$RESPONSE_CODE" -gt 299 ]; then
            echo "NULL — PR validation endpoint error"
            exit 1
          fi

          STATUS=$(jq -r '.status // empty' pr-validate.json)
          RESULT=$(jq -r '.result // empty' pr-validate.json)

          if [ "$STATUS" != "VALID" ] || [ "$RESULT" != "VALID" ]; then
            echo "NULL — PR validation failed"
            cat pr-validate.json
            exit 1
          fi

          echo "VALID — PR allowed"